name: 🚀 Deploy Django App to EC2

on:
  push:
    branches:
      - main

jobs:
    # 🔍 JOB 1: Code Quality + Security Checks
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pylint bandit pip-audit

      - name: Run Flake8
        run: flake8 .

      - name: Run Pylint
        run: pylint online_voting_system || true
        # ⚠️ don't fail pipeline yet (optional)

      - name: Run Bandit (Security Scan)
        run: bandit -r . -ll

      - name: Run pip-audit (Dependency Scan)
        run: pip-audit
        
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup SSH connection
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      # Step 3: Deploy to EC2
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            
            echo "🚀 Connected to EC2"

            cd ~/leave_mng_sys

            echo "📥 Pulling latest code"
            git pull origin main

            echo "🐍 Activating virtual environment"
            source venv/bin/activate

            echo "📂 Moving to Django project"
            cd leave-management-system/leave_system

            echo "📦 Installing dependencies"
            pip install -r ../../requirements.txt

            echo "⚙️ Running migrations"
            python manage.py migrate

            echo "📁 Collecting static files"
            python manage.py collectstatic --noinput

            echo "🔄 Restarting services"
            sudo systemctl restart gunicorn
            sudo systemctl restart nginx

            echo "✅ Deployment successful"

          EOF