name: 🚀 Deploy Django App to EC2

on:
  push:
    branches:
      - main

jobs:

  # 🔍 JOB 1: Code Quality + Security Checks
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pylint pylint-django bandit pip-audit

      - name: Run Flake8
        run: |
          flake8 leave-management-system \
          --max-line-length=120 \
          --exclude=venv,__pycache__,migrations

      - name: Run Pylint
        run: |
          pylint leave-management-system/leave_system/accounts \
                 leave-management-system/leave_system/leaves \
          --ignore=migrations \
          --load-plugins=pylint_django \
          --disable=C0114,C0115,C0116,R0903,R0801,C0103,W0613,W0612,R0911,R1705

      - name: Run Bandit (Security Scan)
        run: |
          bandit -r leave-management-system/leave_system \
          -x venv,__pycache__,migrations,static,media

      - name: Run pip-audit (Dependency Scan)
        run: pip-audit

  # 🚀 JOB 2: Deployment (only if checks pass)
  deploy:
    needs: checks   # 🔥 IMPORTANT
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            
            echo "🚀 Connected to EC2"

            cd ~/leave_mng_sys

            echo "📥 Pulling latest code"
            git pull origin main

            echo "🐍 Activating virtual environment"
            source venv/bin/activate

            echo "📂 Moving to Django project"
            cd leave-management-system/leave_system

            echo "📦 Installing dependencies"
            pip install -r ../../requirements.txt

            echo "⚙️ Running migrations"
            python manage.py migrate

            echo "📁 Collecting static files"
            python manage.py collectstatic --noinput

            echo "🔄 Restarting services"
            sudo systemctl restart gunicorn
            sudo systemctl restart nginx

            echo "✅ Deployment successful"

          EOF